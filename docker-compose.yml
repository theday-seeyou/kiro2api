services:
  kiro2api:
    # 使用国内镜像
    # image: ghcr.nju.edu.cn/${IMAGE_OWNER:-luohui1}/kiro2api:${IMAGE_TAG:-latest}
    image: ghcr.io/${IMAGE_OWNER:-luohui1}/kiro2api:${IMAGE_TAG:-latest}
    container_name: kiro2api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8990:8990"
    volumes:
      - ./config/:/app/config/
    restart: unless-stopped

networks:
  default:
    name: kiro2api_default
